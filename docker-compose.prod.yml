# PRODUCTION 

services:
  postgres:
    image: postgres:18
    container_name: fabermd-postgres-prod
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TZ: Europe/Chisinau
    ports:
      - "${PORT_POSTGRES:-127.0.0.1:5433:5432}"
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
      - ./docker/backups:/backups
    networks:
      - fabermd-prod-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
    restart: unless-stopped

  pgbouncer:
    image: edoburu/pgbouncer:1.24.1
    container_name: fabermd-pgbouncer-prod
    environment:
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - POOL_MODE=transaction
      - MAX_CLIENT_CONN=5000
      - DEFAULT_POOL_SIZE=100
      - IGNORE_STARTUP_PARAMETERS=extra_float_digits
    ports:
      - "${PORT_PGBOUNCER:-127.0.0.1:6432:6432}"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - fabermd-prod-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -h localhost -p 6432 -U ${POSTGRES_USER} || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis-master:
    image: bitnami/redis:7.4
    container_name: fabermd-redis-master
    environment:
      - REDIS_REPLICATION_MODE=master
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    volumes:
      - redis_master_data:/bitnami/redis/data
    networks:
      - fabermd-prod-network
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis-replica-1:
    image: bitnami/redis:7.4
    container_name: fabermd-redis-replica-1
    environment:
      - REDIS_REPLICATION_MODE=slave
      - REDIS_MASTER_HOST=redis-master
      - REDIS_MASTER_PASSWORD=${REDIS_PASSWORD}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    depends_on:
      redis-master:
        condition: service_healthy
    networks:
      - fabermd-prod-network
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis-replica-2:
    image: bitnami/redis:7.4
    container_name: fabermd-redis-replica-2
    environment:
      - REDIS_REPLICATION_MODE=slave
      - REDIS_MASTER_HOST=redis-master
      - REDIS_MASTER_PASSWORD=${REDIS_PASSWORD}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    depends_on:
      redis-master:
        condition: service_healthy
    networks:
      - fabermd-prod-network
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis-sentinel-1:
    image: bitnami/redis-sentinel:7.4
    container_name: fabermd-redis-sentinel-1
    environment:
      - REDIS_MASTER_HOST=redis-master
      - REDIS_MASTER_PASSWORD=${REDIS_PASSWORD}
      - REDIS_MASTER_SET=mymaster
      - REDIS_SENTINEL_DOWN_AFTER_MILLISECONDS=5000
      - REDIS_SENTINEL_QUORUM=2
    depends_on:
      redis-master:
        condition: service_healthy
    networks:
      - fabermd-prod-network
    healthcheck:
      test: [ "CMD", "redis-cli", "-p", "26379", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis-sentinel-2:
    image: bitnami/redis-sentinel:7.4
    container_name: fabermd-redis-sentinel-2
    environment:
      - REDIS_MASTER_HOST=redis-master
      - REDIS_MASTER_PASSWORD=${REDIS_PASSWORD}
      - REDIS_MASTER_SET=mymaster
      - REDIS_SENTINEL_DOWN_AFTER_MILLISECONDS=5000
      - REDIS_SENTINEL_QUORUM=2
    depends_on:
      redis-master:
        condition: service_healthy
    networks:
      - fabermd-prod-network
    healthcheck:
      test: [ "CMD", "redis-cli", "-p", "26379", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis-sentinel-3:
    image: bitnami/redis-sentinel:7.4
    container_name: fabermd-redis-sentinel-3
    environment:
      - REDIS_MASTER_HOST=redis-master
      - REDIS_MASTER_PASSWORD=${REDIS_PASSWORD}
      - REDIS_MASTER_SET=mymaster
      - REDIS_SENTINEL_DOWN_AFTER_MILLISECONDS=5000
      - REDIS_SENTINEL_QUORUM=2
    depends_on:
      redis-master:
        condition: service_healthy
    networks:
      - fabermd-prod-network
    healthcheck:
      test: [ "CMD", "redis-cli", "-p", "26379", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  gateway:
    image: nginx:1.28-alpine
    container_name: fabermd-gateway-prod
    ports:
      - "4001:80"
    volumes:
      - ./docker/nginx/api.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      api:
        condition: service_healthy
    networks:
      - fabermd-prod-network
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: fabermd-api-prod
    # ports:
    #   - "4001:4000" # Прямой доступ закрыт, используем gateway
    env_file:
      - .env
    environment:
      - TZ=Europe/Chisinau
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@pgbouncer:6432/${POSTGRES_DB}?pgbouncer=true
      - DIRECT_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - REDIS_SENTINELS=redis-sentinel-1:26379,redis-sentinel-2:26379,redis-sentinel-3:26379
      - REDIS_SENTINEL_NAME=mymaster
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    volumes:
      - ./logs:/app/logs
      - ./uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      pgbouncer:
        condition: service_healthy
      redis-sentinel-1:
        condition: service_healthy
    networks:
      - fabermd-prod-network
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ============================================================
  # Worker — отдельный процесс для Bull jobs + cron-задач.
  #
  # Преимущества:
  #  - Крэш воркера не роняет HTTP API
  #  - Независимое масштабирование (scale: 2+ workers для Bull)
  #  - Меньше памяти на каждый процесс
  #  - Рестарт воркера без downtime API
  #
  # При необходимости запустить несколько воркеров:
  #   docker compose up --scale worker=3 -d
  # ============================================================
  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: fabermd-worker-prod
    command: [ "node", "dist/processes/worker/worker.js" ]
    env_file:
      - .env
    environment:
      - TZ=Europe/Chisinau
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@pgbouncer:6432/${POSTGRES_DB}?pgbouncer=true
      - DIRECT_URL=postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - REDIS_SENTINELS=${REDIS_SENTINELS}
      - REDIS_SENTINEL_NAME=${REDIS_SENTINEL_NAME}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    volumes:
      - ./logs:/app/logs
      - ./uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      pgbouncer:
        condition: service_healthy
      redis-sentinel-1:
        condition: service_healthy
      api:
        condition: service_healthy
    networks:
      - fabermd-prod-network
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "node", "-e", "process.exit(0)" ]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ============================================================
  # Bull Board — UI для мониторинга Bull-очередей.
  #
  # Доступен на порту 3500 (по умолчанию только localhost).
  # Для доступа снаружи: PORT_BULL_BOARD=3500:3500
  # ============================================================
  bull-board:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: fabermd-bull-board-prod
    command: [ "node", "dist/processes/bull-board/bull-board.js" ]
    env_file:
      - .env
    environment:
      - TZ=Europe/Chisinau
      - BULL_BOARD_PORT=3500
      - REDIS_SENTINELS=${REDIS_SENTINELS}
      - REDIS_SENTINEL_NAME=${REDIS_SENTINEL_NAME}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    ports:
      - "${PORT_BULL_BOARD:-127.0.0.1:3500:3500}"
    depends_on:
      redis-sentinel-1:
        condition: service_healthy
    networks:
      - fabermd-prod-network
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: fabermd-prometheus-prod
    ports:
      - "${PORT_PROMETHEUS:-127.0.0.1:9091:9090}"
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_prod_data:/prometheus
    networks:
      - fabermd-prod-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: fabermd-grafana-prod
    ports:
      - "${PORT_GRAFANA:-127.0.0.1:3002:3000}"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
      GF_SERVER_ROOT_URL: http://195.178.106.27:3002
    volumes:
      - grafana_prod_data:/var/lib/grafana
      - ./docker/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./docker/grafana/datasources:/etc/grafana/provisioning/datasources
    networks:
      - fabermd-prod-network
    restart: unless-stopped

networks:
  fabermd-prod-network:
    driver: bridge

volumes:
  postgres_prod_data:
  redis_master_data:
  prometheus_prod_data:
  grafana_prod_data:
