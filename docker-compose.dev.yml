services:
  postgres:
    image: postgres:18
    container_name: masterhub-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-project3}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bacardi}
      TZ: Europe/Chisinau
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./docker/backups:/backups
    networks:
      - masterhub-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: masterhub-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
      - ./docker/redis.conf:/usr/local/etc/redis/redis.conf
    command: redis-server /usr/local/etc/redis/redis.conf
    networks:
      - masterhub-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: masterhub-redis-commander
    environment:
      REDIS_HOSTS: local:redis:6379
      HTTP_USER: admin
      HTTP_PASSWORD: admin
    ports:
      - "8081:8081"
    depends_on:
      - redis
    networks:
      - masterhub-network

  prisma-studio:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: masterhub-prisma-studio
    ports:
      - "5555:5555"
    volumes:
      - ./prisma:/app/prisma
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - masterhub-network
    environment:
      HOST: "0.0.0.0"
    command: npx prisma studio --url="postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-bacardi}@postgres:5432/${POSTGRES_DB:-project3}" --port 5555 --browser none

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: masterhub-api-dev
    ports:
      - "4000:4000"
    environment:
      TZ: Europe/Chisinau
    env_file:
      - .env.docker
    volumes:
      - ./src:/app/src
      - ./prisma:/app/prisma
      - ./logs:/app/logs
      - ./uploads:/app/uploads
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - masterhub-network
    command: npm run start:dev
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  bull-board:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: masterhub-bull-board
    ports:
      - "3500:3500"
    environment:
      TZ: Europe/Chisinau
      BULL_BOARD_PORT: 3500
    env_file:
      - .env.docker
    volumes:
      - ./src:/app/src
      - /app/node_modules
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - masterhub-network
    command: npm run start:bull-board:dev
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: masterhub-prometheus-dev
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    networks:
      - masterhub-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: masterhub-grafana-dev
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./docker/grafana/datasources:/etc/grafana/provisioning/datasources
    networks:
      - masterhub-network
    restart: unless-stopped

networks:
  masterhub-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data: