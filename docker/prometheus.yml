global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'fabermd-monitor'

scrape_configs:
  # API метрики (внутри Docker сети)
  - job_name: 'fabermd-api'
    static_configs:
      - targets: ['api:4000']
        labels:
          service: 'fabermd-api'
          environment: 'development'
    metrics_path: '/metrics'
    scrape_interval: 15s

  # Prometheus само-мониторинг
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          service: 'prometheus'
