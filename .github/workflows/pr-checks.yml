name: Pull Request Checks

on:
  pull_request:
    branches:
      - main
      - develop

env:
  NODE_VERSION: '25'

jobs:
  pr-validation:
    name: PR Title and Description Check
    runs-on: ubuntu-latest
    steps:
      - name: Check PR title
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            build
            ci
            chore
          requireScope: false

      - name: Check PR size
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const changes = pr.additions + pr.deletions;
            if (changes > 1000) {
              core.warning(`This PR has ${changes} line changes. Consider breaking it into smaller PRs.`);
            }

  docker-build-test:
    name: Test Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          target: production
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: NODE_ENV=production
      - name: Test Docker image
        run: |
          docker build -t test-backend:pr .
          docker run --rm test-backend:pr node --version

  security-scan:
    name: Security Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high

  code-quality:
    name: Code Quality Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm run lint

  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        ports: [5432:5432]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports: [6379:6379]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm run prisma:generate
      - run: npm run test
      - run: npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://test_user:test_password@localhost:5432/test_db
      - run: npm run test:api
        env:
          DATABASE_URL: postgresql://test_user:test_password@localhost:5432/test_db
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          JWT_ACCESS_SECRET: test-secret-key-for-ci
          JWT_REFRESH_SECRET: test-refresh-secret-key-for-ci
          ID_ENCRYPTION_SECRET: test-encryption-secret-32chars

  docker-compose-validation:
    name: Validate Docker Compose
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate docker-compose.dev.yml
        run: docker-compose -f docker-compose.dev.yml config
      - name: Create minimal .env.production
        run: |
          echo "DATABASE_URL=postgresql://postgres:test@postgres:5432/project3" > .env.production
          echo "JWT_ACCESS_SECRET=test-secret" >> .env.production
          echo "JWT_REFRESH_SECRET=test-refresh-secret" >> .env.production
          echo "ID_ENCRYPTION_SECRET=test-encryption-secret-32chars" >> .env.production
          echo "REDIS_HOST=redis" >> .env.production
          echo "REDIS_PORT=6379" >> .env.production
          echo "NODE_ENV=production" >> .env.production
      - name: Validate docker-compose.prod.yml
        run: docker-compose -f docker-compose.prod.yml config
      - name: Start services
        run: |
          docker-compose -f docker-compose.dev.yml up -d postgres redis
          sleep 10
      - name: Check service health
        run: docker-compose -f docker-compose.dev.yml ps
      - name: Cleanup
        if: always()
        run: docker-compose -f docker-compose.dev.yml down -v

  pr-comment:
    name: PR Comment with Build Info
    runs-on: ubuntu-latest
    needs: [docker-build-test, security-scan, code-quality, backend-tests]
    if: always()
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const botComment = comments.find(c => c.user.type === 'Bot' && c.body.includes('## CI/CD Check Results'));
            const output = `## CI/CD Check Results
            | Check | Status |
            |-------|--------|
            | Docker Build | ${{ needs.docker-build-test.result == 'success' && '✅' || '❌' }} |
            | Security Scan | ${{ needs.security-scan.result == 'success' && '✅' || '❌' }} |
            | Code Quality | ${{ needs.code-quality.result == 'success' && '✅' || '❌' }} |
            | Backend Tests | ${{ needs.backend-tests.result == 'success' && '✅' || '❌' }} |
            Updated: ${new Date().toUTCString()}`;
            if (botComment) {
              github.rest.issues.updateComment({ owner: context.repo.owner, repo: context.repo.repo, comment_id: botComment.id, body: output });
            } else {
              github.rest.issues.createComment({ issue_number: context.issue.number, owner: context.repo.owner, repo: context.repo.repo, body: output });
            }