name: Docker Stack Health Check

on:
  schedule:
    - cron: '0 2 * * *'  # Daily at 2 AM UTC
  workflow_dispatch:

env:
  COMPOSE_FILE: docker-compose.dev.yml

jobs:
  stack-health-check:
    name: Backend Stack Health Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Create .env.docker
        run: |
          cat > backend/.env.docker << EOF
          DATABASE_URL=postgresql://postgres:bacardi@postgres:5432/project3
          JWT_ACCESS_SECRET=test-jwt-access-secret-key-32chars
          JWT_REFRESH_SECRET=test-jwt-refresh-secret-key-32chars
          ID_ENCRYPTION_SECRET=test-encryption-secret-32chars
          REDIS_HOST=redis
          REDIS_PORT=6379
          NODE_ENV=development
          EOF

      - name: Start stack
        run: |
          docker-compose -f docker-compose.dev.yml up -d
          sleep 30

      - name: Check PostgreSQL health
        run: |
          docker exec masterhub-postgres pg_isready -U postgres
          docker exec masterhub-postgres psql -U postgres -c "SELECT version();"

      - name: Check Redis health
        run: |
          docker exec masterhub-redis redis-cli ping
          docker exec masterhub-redis redis-cli INFO server

      - name: Run database migrations
        run: docker exec masterhub-api-dev npx prisma migrate deploy

      - name: Check API health
        run: |
          timeout 120 bash -c 'until curl -f http://localhost:4000/health; do sleep 5; done'
          curl -f http://localhost:4000/health
          curl -f http://localhost:4000/docs

      - name: Check service logs
        if: always()
        run: |
          echo "=== PostgreSQL Logs ==="
          docker-compose -f docker-compose.dev.yml logs postgres
          echo "=== Redis Logs ==="
          docker-compose -f docker-compose.dev.yml logs api

      - name: Cleanup
        if: always()
        run: docker-compose -f docker-compose.dev.yml down -v

      - name: Notify on failure
        if: failure()
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: 'Docker stack health check failed! :warning:'
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}